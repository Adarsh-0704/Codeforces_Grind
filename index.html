<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="CSS/components.css">

</head>
<body>
    <header>
        <h1>Codeforces Problem Finder</h1>
        <div class="searchbar">
            <input type="text" id="search" placeholder="Search by problem name">
        </div>
        <div class="filters">
            <select id="tags">
                <option value="all">All Topics</option>
            </select>
            <button class="ascending">Easiest</button>
            <button class="descending">Hardest</button>
        </div>
    </header>

    <main>
        <div id="problems" class="list">
            <div class="li"></div>
            <div class="li"></div>
            <div class="li"></div>
            <div class="li"></div>
            <div class="li"></div>
            <div class="li"></div>
            <div class="li"></div>
            <div class="li"></div>
        </div>
        <div id="page_control"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
